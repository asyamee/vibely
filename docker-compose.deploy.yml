# Production docker-compose для деплоя через GitHub Actions.
#
# Отличается от docker-compose-prod.yml тем, что НЕ собирает образы локально,
# а тянет готовые из GitHub Container Registry (ghcr.io). Это в десятки раз
# быстрее на сервере (нет git pull, нет npm install, нет TypeScript-компиляции)
# и не требует исходников на сервере вообще.
#
# Использование:
#   docker compose -f docker-compose.deploy.yml --env-file .env.production pull
#   docker compose -f docker-compose.deploy.yml --env-file .env.production up -d
#
# IMAGE_TAG задаётся GitHub Actions из git SHA. Локально можно использовать
# IMAGE_TAG=latest для последнего успешного билда из main.

services:
  postgres:
    image: postgres:15-alpine
    container_name: vibely-db
    environment:
      POSTGRES_DB: vibely
      POSTGRES_USER: vibely_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibely_user -d vibely"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibely-network
    restart: always
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB

  api:
    # GHCR_OWNER задаётся из env (обычно совпадает с GitHub username/org).
    # IMAGE_TAG — git SHA коммита или "latest".
    image: ghcr.io/${GHCR_OWNER}/vibely-backend:${IMAGE_TAG:-latest}
    container_name: vibely-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://vibely_user:${DB_PASSWORD}@postgres:5432/vibely
      ACCESS_TOKEN: ${YANDEX_ACCESS_TOKEN}
      USER_ID: ${YANDEX_USER_ID}
      AI_SERVICE_URL: http://ai:8000
      AI_ADMIN_TOKEN: ${AI_ADMIN_TOKEN}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN required}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
    networks:
      - vibely-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    # Образ frontend собран с уже впечённым NEXT_PUBLIC_BACKEND_URL
    # (см. build-arg в .github/workflows/build.yml)
    image: ghcr.io/${GHCR_OWNER}/vibely-frontend:${IMAGE_TAG:-latest}
    container_name: vibely-web
    depends_on:
      - api
    environment:
      NODE_ENV: production
    networks:
      - vibely-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ai:
    image: ghcr.io/${GHCR_OWNER}/vibely-ai:${IMAGE_TAG:-latest}
    container_name: vibely-ai
    environment:
      AI_DEVICE: ${AI_DEVICE:-cpu}
      AI_MODEL_PATH: /app/user_encoder.pt
      AI_ADMIN_TOKEN: ${AI_ADMIN_TOKEN}
    volumes:
      - ./ai/data:/app/data
      - ai_weights:/app/weights
    networks:
      - vibely-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  nginx:
    image: nginx:alpine
    container_name: vibely-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - vibely-network
    depends_on:
      - web
      - api
    restart: always

networks:
  vibely-network:
    driver: bridge

volumes:
  postgres_data:
  ai_weights:
  nginx_cache:
