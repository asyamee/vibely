# CI — быстрые проверки кода: lint и компиляция TypeScript.
# Запускается на каждый push в main и на каждый PR.
# Если этот workflow красный — build/deploy не запустятся.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: ESLint + проверка типов через Next.js (next build делает type-check)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Backend: TypeScript компиляция (npm run build выполняет tsc).
  # Ошибки типов завалят билд — это и есть проверка типов.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

  # ---------------------------------------------------------------------------
  # AI: проверка, что requirements.txt валиден и Python импортит модули
  # ---------------------------------------------------------------------------
  ai:
    name: AI imports check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke import
        # Если service.py или model.py содержат синтаксические ошибки
        # или ошибки импорта — падаем здесь.
        run: python -c "import service; import model"
