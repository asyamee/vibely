version: '3.8'

# Production-уровень конфигурация с Nginx, масштабированием и мониторингом

services:
  postgres:
    image: postgres:15-alpine
    container_name: vibely-db
    environment:
      POSTGRES_DB: vibely
      POSTGRES_USER: vibely_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibely_user -d vibely"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vibely-network
    restart: always
    # Backup скрипт (раз в день)
    command: >
      -c max_connections=200
      -c shared_buffers=256MB

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vibely-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://vibely_user:${DB_PASSWORD}@postgres:5432/vibely
      ACCESS_TOKEN: ${YANDEX_ACCESS_TOKEN}
      USER_ID: ${YANDEX_USER_ID}
      AI_SERVICE_URL: http://ai:8000
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    networks:
      - vibely-network
    restart: always
    # Healthcheck для load balancer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vibely-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://api:3001/api
      NODE_ENV: production
    networks:
      - vibely-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: vibely-ai
    environment:
      AI_DEVICE: ${AI_DEVICE:-cpu}
      AI_MODEL_PATH: user_encoder.pt
    volumes:
      - ./ai/data:/app/data
      - ./ai/user_encoder.pt:/app/user_encoder.pt
    networks:
      - vibely-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Ограничиваем ресурсы AI сервиса
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

  # Nginx reverse proxy с SSL
  nginx:
    image: nginx:alpine
    container_name: vibely-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL сертификаты от Let's Encrypt
      - nginx_cache:/var/cache/nginx
    networks:
      - vibely-network
    depends_on:
      - web
      - api
      - ai
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # (Опционально) Prometheus для мониторинга
  prometheus:
    image: prom/prometheus:latest
    container_name: vibely-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - vibely-network
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # (Опционально) Grafana для визуализации метрик
  grafana:
    image: grafana/grafana:latest
    container_name: vibely-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - vibely-network
    restart: always
    depends_on:
      - prometheus

networks:
  vibely-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  nginx_cache:
