# Nginx reverse proxy для Vibely.
#
# Архитектура:
#   - HTTP (80) только редиректит на HTTPS, кроме /.well-known/acme-challenge
#     (этот путь нужен certbot для подтверждения владения доменом).
#   - HTTPS (443) терминирует SSL и проксирует на frontend/backend.
#
# Если SSL ещё не настроен — закомментируйте секцию "server { listen 443 ..."
# и блок редиректа в HTTP-сервере. Vibely будет работать на голом HTTP.

upstream frontend {
    server web:3000;
}

upstream backend {
    server api:3001;
}

# Лимит размера загружаемого тела (jsonl-экспорт может быть большим)
client_max_body_size 100M;

# ============================================================================
# HTTP — редирект на HTTPS + ACME challenge для Let's Encrypt
# ============================================================================
server {
    listen 80;
    server_name _;

    # certbot пишет файлы валидации в эту папку и проверяет их через HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health-check для load balancer / uptime monitor (без редиректа)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Всё остальное — редирект на HTTPS.
    # Если домен ещё не куплен — закомментируйте следующую строку
    # и раскомментируйте блок "Frontend (без SSL)" ниже.
    location / {
        return 301 https://$host$request_uri;
    }

    # ----- Без SSL (раскомментировать для запуска без домена) -----
    # location / {
    #     proxy_pass http://frontend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # location /api/ {
    #     proxy_pass http://backend/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

# ============================================================================
# HTTPS — основной сервер (раскомментировать после получения сертификата)
# ============================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # SSL-сертификаты от Let's Encrypt (см. DEPLOYMENT_GUIDE.md, шаг про certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Современные настройки SSL: TLS 1.2+, безопасные шифры
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS — заставляет браузер всегда использовать HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ----- Frontend (Next.js) -----
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        # Эти заголовки нужны для WebSocket (Next.js HMR в dev,
        # в prod не используется, но безвредно)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----- Backend API -----
    # Запросы /api/* проксируем на backend без переписывания пути,
    # backend сам добавляет префикс /api в роутах.
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-стриминг логов обучения (/api/admin/retrain/stream) —
        # отключаем буферизацию, увеличиваем таймауты
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # AI-сервис наружу НЕ выставляется — общается с backend через
    # внутреннюю сеть Docker. Это намеренно: AI_ADMIN_TOKEN защищает
    # admin-эндпоинты, но публичный доступ всё равно лишний.
}
